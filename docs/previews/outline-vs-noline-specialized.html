<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KKStyle Outline Vs Noline Specialized</title>
    <style>
      :root {
        --canvas-width: 1500px;
        --canvas-height: 2000px;
        --bg: #f4f8fd;
        --ink: #2e3a49;
        --muted: #738397;
        --line: #dbe5f0;
        --card: rgba(255, 255, 255, 0.92);
        --soft: #eef4fb;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
      }
      .frame {
        width: var(--canvas-width);
        height: var(--canvas-height);
        padding: 56px;
        background:
          radial-gradient(circle at 84% 10%, rgba(93, 164, 255, 0.1), transparent 16%),
          linear-gradient(rgba(219, 229, 240, 0.9) 1px, transparent 1px),
          linear-gradient(90deg, rgba(219, 229, 240, 0.9) 1px, transparent 1px),
          linear-gradient(180deg, #fafcff, var(--bg));
        background-size: auto, 40px 40px, 40px 40px, auto;
      }
      .shell {
        width: 100%;
        height: 100%;
        border-radius: 42px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(46, 58, 73, 0.08);
        box-shadow: 0 28px 60px rgba(69, 112, 171, 0.12);
        padding: 34px 34px 28px;
      }
      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 26px;
      }
      .title-block h1 {
        margin: 0;
        color: var(--ink);
        font-size: 54px;
        line-height: 1;
        letter-spacing: -0.04em;
        font-weight: 900;
      }
      .title-block p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 22px;
        line-height: 1.35;
        font-weight: 600;
      }
      .legend {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .legend-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid rgba(46, 58, 73, 0.1);
        color: var(--ink);
        font-size: 18px;
        font-weight: 900;
      }
      .rows {
        display: grid;
        gap: 18px;
      }
      .row {
        display: grid;
        grid-template-columns: 170px 1fr 1fr;
        gap: 18px;
        align-items: stretch;
        min-height: 416px;
      }
      .label {
        border-radius: 30px;
        background: var(--card);
        border: 1px solid rgba(46, 58, 73, 0.08);
        box-shadow: 0 14px 36px rgba(69, 112, 171, 0.08);
        padding: 22px 18px;
        display: grid;
        align-content: center;
        gap: 8px;
      }
      .label strong {
        color: var(--ink);
        font-size: 28px;
        line-height: 1.02;
        font-weight: 900;
      }
      .label span {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.34;
        font-weight: 700;
      }
      .card {
        border-radius: 34px;
        background: var(--card);
        border: 1px solid rgba(46, 58, 73, 0.08);
        box-shadow: 0 18px 40px rgba(69, 112, 171, 0.08);
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }
      .card-title {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        width: fit-content;
        padding: 0 12px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--ink);
        font-size: 16px;
        font-weight: 900;
      }
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 24px;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="shell">
        <header class="header">
          <div class="title-block">
            <h1>描边版 vs 无描边版</h1>
            <p>功能型海报也保持同一套映射关系。无描边版会弱化线稿和硬边界，但不会丢掉每套风格自己的识别点。</p>
          </div>
          <div class="legend">
            <span class="legend-chip">描边版</span>
            <span class="legend-chip">无描边版</span>
          </div>
        </header>
        <section class="rows">
          <div class="row">
            <div class="label"><strong>CLASS NOTES</strong><span>课堂笔记高亮页</span></div>
            <article class="card">
              <span class="card-title">描边版</span>
              <img src="file:///tmp/kkstyle-style-previews-soft/class-notes.png" alt="class notes outline" />
            </article>
            <article class="card">
              <span class="card-title">无描边版</span>
              <img src="file:///tmp/kkstyle-noline-previews/class-notes-noline.png" alt="class notes noline" />
            </article>
          </div>
          <div class="row">
            <div class="label"><strong>MINIMAL TECH</strong><span>极简科技发布页</span></div>
            <article class="card">
              <span class="card-title">描边版</span>
              <img src="file:///tmp/kkstyle-style-previews-soft/minimal-tech.png" alt="minimal tech outline" />
            </article>
            <article class="card">
              <span class="card-title">无描边版</span>
              <img src="file:///tmp/kkstyle-noline-previews/minimal-tech-noline.png" alt="minimal tech noline" />
            </article>
          </div>
          <div class="row">
            <div class="label"><strong>POSTER COMIC</strong><span>漫画海报高饱和页</span></div>
            <article class="card">
              <span class="card-title">描边版</span>
              <img src="file:///tmp/kkstyle-style-previews-soft/poster-comic.png" alt="poster comic outline" />
            </article>
            <article class="card">
              <span class="card-title">无描边版</span>
              <img src="file:///tmp/kkstyle-noline-previews/poster-comic-noline.png" alt="poster comic noline" />
            </article>
          </div>
          <div class="row">
            <div class="label"><strong>DIAGRAM BOARD</strong><span>信息图白板讲解页</span></div>
            <article class="card">
              <span class="card-title">描边版</span>
              <img src="file:///tmp/kkstyle-style-previews-soft/diagram-board.png" alt="diagram board outline" />
            </article>
            <article class="card">
              <span class="card-title">无描边版</span>
              <img src="file:///tmp/kkstyle-noline-previews/diagram-board-noline.png" alt="diagram board noline" />
            </article>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
